name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch cloudbase_ce plugin
        run: |
          chmod +x android/fix_plugin.sh
          bash android/fix_plugin.sh

      - name: Build debug APK
        run: |
          flutter build apk --debug --android-skip-build-dependency-validation 2>&1 | tee /tmp/build.log || true
          echo "--- APK LOCATIONS ---"
          find . -name "*.apk" 2>/dev/null
          echo "--- LAST 30 LINES ---"
          tail -30 /tmp/build.log
        timeout-minutes: 20

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
        continue-on-error: true