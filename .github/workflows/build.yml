name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Patch cloudbase_ce in pub-cache
        run: |
          PUB_CACHE="${HOME}/.pub-cache"
          CLOUD_DIR=$(find "${PUB_CACHE}/hosted/pub.dev" -maxdepth 1 -type d -name "cloudbase_ce-*" | head -1)
          if [ -d "$CLOUD_DIR/android" ]; then
            BUILD_FILE="$CLOUD_DIR/android/build.gradle"
            if [ -f "$BUILD_FILE" ]; then
              # Inject namespace if missing
              if ! grep -q "namespace" "$BUILD_FILE"; then
                PKG=$(grep 'package="' "$CLOUD_DIR/android/src/main/AndroidManifest.xml" | sed 's/.*package="\([^"]*\)".*/\1/')
                echo "Injecting namespace '$PKG' into cloudbase_ce"
                sed -i "s/android {/android {\n    namespace '$PKG'/" "$BUILD_FILE"
              fi
              # Upgrade compileSdkVersion if too low
              if grep -q "compileSdkVersion [0-9]\+" "$BUILD_FILE"; then
                CURRENT_SDK=$(grep "compileSdkVersion" "$BUILD_FILE" | grep -o "[0-9]\+")
                if [ "$CURRENT_SDK" -lt 30 ]; then
                  echo "Upgrading compileSdkVersion $CURRENT_SDK -> 30"
                  sed -i "s/compileSdkVersion $CURRENT_SDK/compileSdkVersion 30/" "$BUILD_FILE"
                fi
              fi
              echo "=== Patched build.gradle ==="
              cat "$BUILD_FILE"
            fi
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug
        timeout-minutes: 20

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7