name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Show Flutter info
        run: |
          flutter --version
          flutter doctor -v 2>&1 | head -50

      - name: Build debug APK
        run: |
          set -x
          flutter build apk --debug 2>&1
        timeout-minutes: 20

      - name: Check build output
        run: |
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "APK directory not found"
          ls -la build/app/outputs/ 2>/dev/null || echo "outputs directory not found"

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7